<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 164" role="img" aria-labelledby="title desc">
  <title id="title">iAcceptDonations.com logo</title>
  <desc id="desc">A modern logo showing a donation bucket catching a coin next to the iAcceptDonations.com wordmark.</desc>
  <defs>
    <linearGradient id="mark-bg" x1="16" y1="12" x2="130" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00a7e8"/>
      <stop offset="0.56" stop-color="#6d5dfc"/>
      <stop offset="1" stop-color="#f53d8e"/>
    </linearGradient>
    <linearGradient id="coin" x1="78" y1="16" x2="112" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe172"/>
      <stop offset="1" stop-color="#ffb020"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#172033" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="18" y="18" width="128" height="128" rx="32" fill="url(#mark-bg)"/>
    <circle cx="98" cy="37" r="19" fill="url(#coin)" stroke="#fff7c8" stroke-width="4"/>
    <path d="M98 26v22M90 34c2.6-5 13.9-4.6 15.5.7 1.8 5.8-12.7 4.7-10.8 10.6 1.5 4.8 11.2 4.4 14.1.2" fill="none" stroke="#172033" stroke-width="5" stroke-linecap="round"/>
    <path d="M53 72c0-9.4 7.6-17 17-17h32c9.4 0 17 7.6 17 17v39c0 9.4-7.6 17-17 17H70c-9.4 0-17-7.6-17-17V72Z" fill="#fff"/>
    <path d="M61 74h50M69 88c5.8 7 27.6 7 34 0" fill="none" stroke="#172033" stroke-width="7" stroke-linecap="round"/>
    <path d="M75 110c6.3 6.7 16.3 6.7 22.6 0" fill="none" stroke="#f53d8e" stroke-width="7" stroke-linecap="round"/>
    <path d="M44 58c-7.5 4.3-12.8 11.2-15.8 20.7M124 50c9.4 3.8 16.2 10.6 20.4 20.4" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  </g>

  <g fill="#111827">
    <text x="178" y="78" font-family="Inter, Arial, sans-serif" font-size="47" font-weight="900" letter-spacing="-1">
      iAcceptDonations.com
    </text>
    <text x="181" y="116" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#5b6475">
      venture-backed asking, no product required
    </text>
  </g>
</svg>
