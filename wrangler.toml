name = "iacceptdonations"
main = "cloudflare-worker.mjs"
compatibility_date = "2026-06-16"
workers_dev = false
preview_urls = false

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = true

[vars]
SITE_URL = "https://www.iacceptdonations.com"
ALLOWED_ORIGIN = "https://www.iacceptdonations.com"
PRODUCT_IMAGE_URL = "https://www.iacceptdonations.com/assets/stripe-money-trash-product-1024.jpg"
PAYPAL_ENV = "live"

# Set this as a Worker secret, not in this file:
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put PAYPAL_CLIENT_ID
# wrangler secret put PAYPAL_CLIENT_SECRET
# wrangler secret put PAYPAL_WEBHOOK_ID
#
# Recommended route in Cloudflare:
# https://www.iacceptdonations.com/api/create-checkout-session
#
[[d1_databases]]
binding = "DB"
database_name = "iacceptdonations-payments"
database_id = "eadd2fa8-0b38-4739-b5d7-fa164fc76747"
